<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow p-4">
                <h3 class="mb-3">Create an Account</h3>
                <div th:if="${param.badpassword}" class="alert alert-danger">Password should be of minimum 8 of length and contain at least 1 digit, symbol, uppercase & lowercase character.</div>
                <form th:action="@{/post/accounts/register}" th:object="${user}" method="post">
                    <div class="mb-3">
                        <input type="email" th:field="*{Email}" maxlength="64" class="form-control" placeholder="Email" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" th:field="*{Password}" maxlength="16" class="form-control" placeholder="Password" required>
                    </div>
                    <div class="mb-3">
                        <input type="text" th:field="*{FirstName}" maxlength="64" class="form-control" placeholder="First Name" required>
                    </div>
                    <div class="mb-3">
                        <input type="text" th:field="*{LastName}" maxlength="64" class="form-control" placeholder="Last Name" required>
                    </div>
                    <div class="mb-3">
                        <input type="text" th:field="*{Address}" maxlength="128" class="form-control" placeholder="Address" required>
                    </div>

                    <div class="mb-3">
                        <select th:field="*{Gender}" class="form-select" required>
                            <option value="" disabled selected>Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <input type="tel" th:field="*{Phone}" maxlength="20" class="form-control" placeholder="Phone Number" required>
                    </div>

                    <div class="mb-3">
                        <input type="date" th:field="*{DateOfBirth}" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-danger w-100">Sign Up</button>
                </form>
                <p class="mt-3">Already have an account? <a href="/accounts/login">Log in</a></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
