<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Reset Password</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#822BD9">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/img/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="container text-center">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow p-4">
        <h3 class="mb-3">Reset Password</h3>

        <div th:if="${error}" th:text="${error}" class="alert alert-danger"></div>
        <div th:if="${success}" th:text="${success}" class="alert alert-success"></div>

        <ul class="nav nav-tabs mb-3" id="resetTab" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="email-tab" data-bs-toggle="tab" data-bs-target="#email" type="button" role="tab">Email</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="phone-tab" data-bs-toggle="tab" data-bs-target="#phone" type="button" role="tab">Phone</button>
          </li>
        </ul>

        <div class="tab-content" id="resetTabContent">
          <div class="tab-pane fade show active" id="email" role="tabpanel">
            <form th:action="${'/accounts/resetpassword?type=email'}" th:object="${user}" method="post">
              <div class="mb-3">
                <label for="Email">Email Address:</label>
                <input type="email" th:field="*{Email}" class="form-control" placeholder="Email" required>
              </div>
              <button type="submit" class="btn btn-danger w-100">Send Email</button>
            </form>
          </div>
          <div class="tab-pane fade" id="phone" role="tabpanel">
            <form th:action="${'/accounts/resetpassword?type=phone'}" th:object="${user}" method="post">
              <div class="mb-3">
                <label for="Phone">Phone Number:</label>
                <input th:field="*{Phone}" class="form-control" placeholder="Phone" required>
              </div>
              <button type="submit" class="btn btn-danger w-100">Send SMS</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
