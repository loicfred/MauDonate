<!DOCTYPE html>
<html lang="en">
<head>
    <title>Fundraise | MauDonate</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#822BD9">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/main.css">

    <style>

        .donate-panel {
            position: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: scroll;
            height: 70vh;
            bottom: 0;
            left: 0;
            right: 0;
            margin: 0 5px;
            background: var(--primary-color-lighter);
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease-out;
        }
        .donate-panel::-webkit-scrollbar {
            display: none;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        .amount-input {
            margin: 0 auto;
        }

        h1 {
            margin-top: 20px;
            text-align: center;
            font-weight: 600;
        }

        #paypal-button-container div iframe {
            min-height: 30vh;
        }
    </style>
    <script src="https://www.paypal.com/sdk/js?client-id=AbYaxvdrhP-eHrsOaZtVJL4yVXysjAjvaS000Hfy4WYozpX8YUTwkfOBCNSeEcH6mFW-g-j5tUtqUbp3&currency=USD"></script>
</head>
<body>

<header th:replace="/fragments/header :: mainHeader" id="master-header"></header>

<main>
    <!-- Main Header -->

    <h1>Support Our Work</h1>
    <p class="text-center opacity-75">
        Every contribution helps ❤️
    </p>

    <!-- Bottom donation panel -->
    <div class="donate-panel">
        <h4 class="m-3 text-center">Choose your donation amount</h4>

        <div class="d-flex flex-column m-3">
            <input type="text" id="title" class="form-control mb-3" placeholder="Title" maxlength="128">
            <textarea id="comment" class="form-control mb-3" placeholder="Comment" maxlength="512" rows="3"></textarea>

            <div class="input-group mb-3">
                <span class="input-group-text">USD</span>
                <input type="number" class="form-control amount-input" id="amountUsd" value="10" min="1" step="0.01">
            </div>
            <!--<small id="usdPreview" class="opacity-75"></small>-->

            <div id="error-text" class="alert alert-danger d-none"></div>
            <div id="success-text" class="alert alert-success d-none"></div>
        </div>

        <div class="w-100" id="paypal-button-container"></div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        const errorText = document.getElementById('error-text');
        const successText = document.getElementById('success-text');
        function renderPayPalButton(amountUsd) {
            document.getElementById('paypal-button-container').innerHTML = '';
            //let amountUsd = 0;

            paypal.Buttons({
                createOrder: function () {
                    return fetch(`/paypal/create-order?amountUsd=${amountUsd}`, {
                        method: 'POST'
                    }).then(res => res.json())
                        .then(data => {
                            errorText.classList.add('d-none');
                            successText.classList.add('d-none');
                            //document.getElementById("usdPreview").innerText = `≈ ${data.amountUsd} USD`;
                            //amountUsd = data.amountUsd;
                            return data.id;
                        });
                },
                onApprove: function (data) {
                    return fetch(`/paypal/capture-order/${data.orderID}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            title: document.getElementById('title').value,
                            comment: document.getElementById('comment').value
                        })
                    }).then(res => res.json())
                        .then(details => {
                            console.log(details);
                            successText.classList.remove('d-none');
                            successText.textContent = "Successfully donated " + details.amountUsd + " " + details.currencyUsd + ".";
                            document.getElementById('notification-list').insertAdjacentHTML("afterbegin",
                                `<div class="notification-item">
                                    <h1 class="m-0">🔔</h1>
                                    <div class="d-flex align-items-center" style="flex-direction: column;">
                                       <h6 class="mb-0 me-auto">${details.notification.Title.length > 40 ? details.notification.Title.substring(0, 40) + '...' : details.notification.Title}</h6>
                                       <p class="mb-0">${details.notification.Message.length > 80 ? details.notification.Message.substring(0, 80) + '...' : details.notification.Message}</p>
                                       <small class="ms-auto">${details.notification.CreatedAt}</small>
                                    </div>
                                 </div>`);
                            notificationDot.classList.remove("d-none");
                        });
                },
                onError: function(err) {
                    console.error(err);
                    errorText.classList.remove('d-none');
                    errorText.textContent = err;
                }
            }).render('#paypal-button-container');
        }

        // Initial render with default value
        renderPayPalButton(document.getElementById('amountUsd').value);

        // Re-render button whenever amount changes
        document.getElementById('amountUsd').addEventListener('input', function() {
            const value = parseFloat(this.value);
            if (value > 0) renderPayPalButton(value);
        });
    </script>

</main>
</body>
</html>
