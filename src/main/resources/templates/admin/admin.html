<!DOCTYPE html>
<html lang="en">
<head id="master-head">
    <title>Admin | MauDonate</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#822BD9">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/main.css">

    <style>
        main {
            background-color: #000000CC;
        }
        .settings-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }


        .request-card, .delivery-card, .modal-content {
            margin: 2px;
            border-radius: 10px;
        }
        .request-card {
            background-color: var(--primary-color-lighter);
        }
        .modal-content {
            background-color: var(--main-color-lighter);
        }
        .delivery-card {
            background-color: var(--delivery-card);
            background-image: url('/img/warehouse_bg.png');
            background-size: cover;
            background-position-x: -100px; background-position-y: -20px;
            background-repeat: no-repeat;
            border: var(--secondary-color) 3px solid;
            cursor: pointer;
            text-decoration: none;
        }
        .delivery-card:hover {
            box-shadow: whitesmoke 0 0 5px;
        }
    </style>
</head>

<body>

<!-- Main Header -->
<header th:replace="/fragments/header :: mainHeader" id="master-header"></header>

<main class="page-wrap" id="pageWrap">
    <div class="page-carousel" id="pageCarousel">

        <!-- PAGE 1 -->
        <section class="page">
            <p style="justify-content: center; align-items: center; text-align: center; padding: 25px;" th:if="${pending_dons.isEmpty()}">No donations currently.</p>
            <div th:if="${successDon}" class="alert alert-success" th:text="${successDon}"></div>
            <div th:each="don : ${pending_dons}" class="request-card card mb-3">
                <div class="card-body">
                    <div class="mb-1">
                        <h5 class="mb-0" th:text="${'From: ' + don.Sender_FName + ' ' + don.Sender_LName}"></h5>
                        <small class="mb-0" th:text="${'~ ' + don.Sender_Address}"></small>
                    </div>
                    <div class="mb-2">
                        <h5 class="mb-0" th:text="${'To: ' + don.Receiver_FName + ' ' + don.Receiver_LName}"></h5>
                        <small class="mb-0" th:text="${'~ ' + don.Receiver_Address}"></small>
                    </div>
                    <p style="border-left: 1px solid gray; padding-left: 8px;" class="mb-2" th:text="${don.Message}"></p>

                    <h5 class="mb-0">Items</h5>
                    <div th:each="item : ${don.getItems()}" class="d-flex flex-column">
                        <p class="mb-0" style="border-left: 1px solid gray; padding-left: 8px;" th:text="${'• ' + item.ItemName + ' (x' + item.Quantity + ')'}"></p>
                    </div>
                    <div class="mt-1 d-flex align-items-center">
                        <small th:text="${'Created at ' + don.CreatedAt}"></small>
                        <button class="ms-auto btn btn-primary" style="min-width: 90px;" onclick="showDonationValidationPopup(this, true)" th:don-id="${don.ID}">Accept</button>
                        <button class="ms-2 btn btn-primary" style="min-width: 90px;" onclick="showDonationValidationPopup(this, false)" th:don-id="${don.ID}">Deny</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- PAGE 2 -->
        <section class="page">
            <p style="justify-content: center; align-items: center; text-align: center; padding: 25px;" th:if="${unapproved_reqs.isEmpty()}">No one has reached out yet.</p>
            <div th:if="${successReq}" class="alert alert-success" th:text="${successReq}"></div>
            <div th:each="req : ${unapproved_reqs}" class="request-card card mb-3">
                <div class="card-body">
                    <div class="text-muted d-flex align-items-center">
                        <h5 th:text="${req.getUser().getFirstName() + ' ' + req.getUser().getLastName()}"></h5>
                        <h5 class="ms-auto" th:text="${'Goal: Rs ' + req.GoalAmount}"></h5>
                    </div>
                    <h6 class="mb-0 fw-bold" th:text="${req.Title}"></h6>
                    <p th:text="${req.Message}"></p>
                    <div class="text-muted d-flex align-items-center">
                        <small th:text="${'Created at ' + req.CreatedAt}"></small>
                        <button class="ms-auto btn btn-primary" style="min-width: 90px;" onclick="showRequestValidationPopup(this, true)" th:req-id="${req.ID}">Accept</button>
                        <button class="ms-2 btn btn-primary" style="min-width: 90px;" onclick="showRequestValidationPopup(this, false)" th:req-id="${req.ID}">Deny</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- PAGE 3 -->
        <section class="page">
            <a th:each="ware : ${warehouses}" th:href="${'/admin/warehouse/' + ware.ID}" class="delivery-card card mb-3" draggable="false">
                <div class="card-body">
                    <div class="text-muted d-flex align-items-center">
                        <h5 th:text="${ware.Name}"></h5>
                        <img class="ms-auto m-1" src="/img/delivery_box_w.png" height="26" alt="box.png">
                        <h5 class="mb-0" th:text="${ware.CapacityUtilization + '/' + ware.MaxCapacity} + ' m²'"></h5>
                    </div>
                    <div class="text-muted d-flex">
                        <div class="row">
                            <small class="mb-0" th:text="${ware.Address}"></small>
                            <small class="mb-0 fw-bold" th:text="${ware.Region}"></small>
                        </div>
                        <h1 class="ms-auto mt-auto mb-0" th:text="${ware.getUtilizationRate() + '%'}"></h1>
                    </div>
                </div>
            </a>
        </section>

        <!-- PAGE 4 -->
        <section class="page">
            <h2 class="settings-header">Database Accessor</h2>
            <div th:if="${successDb}" class="alert alert-success" th:text="${successDb}"></div>
            <form id="databaseForm">
                <div class="mb-3 d-flex align-items-center">
                    <label for="tableSelect" class="form-label mb-0 w-25 me-1">Table</label>
                    <select id="tableSelect" onchange="addSelect(this)" class="form-select">
                        <option value="" disabled selected>- Public -</option>
                        <option value="User">User Accounts</option>
                        <option value="Donation_Request">Donation request</option>
                        <option value="Donation">Donations</option>
                        <option value="Fundraising">Fundraising</option>
                        <option value="Association">Association</option>
                        <option value="Campaign">Campaigns</option>
                        <option value="" disabled>- Private -</option>
                        <option value="Staff">Staffs</option>
                        <option value="Vehicle">Vehicles</option>
                        <option value="Warehouse">Warehouses</option>
                        <option value="Trip">Trips</option>
                        <option value="" disabled>- Other -</option>
                        <option value="Email_Verification">Email verifications</option>
                    </select>
                </div>

                <div class="mb-3 d-flex align-items-center">
                    <label for="ID" class="form-label w-25 me-1">ID</label>
                    <select id="IDs" class="form-control me-1" style="width: 50%" disabled></select>
                    <input type="text" id="ID" maxlength="16" style="width: 50%" class="form-control" disabled>
                </div>

                <div class="mb-3">
                    <h5 class="form-label">Database information:</h5>
                    <p class="mb-0" th:text="${'Table count: ' + dbstat.totalTables}"></p>
                    <p class="mb-0" th:text="${'Views count: ' + dbstat.totalViews}"></p>
                    <p class="mb-0" th:text="${'Total rows: ' + dbstat.totalRows}"></p>
                </div>
                <div class="mb-3 d-none" id="TableDetails">
                    <h5 class="form-label">Table information:</h5>
                    <p class="mb-0" id="TableDetailsName"></p>
                    <p class="mb-0" id="TableDetailsRows"></p>
                    <p class="mb-0" id="TableDetailsColumns"></p>
                </div>

                <div th:if="${param.errorDb}" class="alert alert-danger">Please input a valid and existing entry.</div>

                <div class="d-flex mb-3">
                    <button type="submit" id="submitDb" class="btn btn-primary w-50 me-1" disabled>Go to entry</button>
                    <button type="button" id="insertDb" class="btn btn-primary w-50 ms-1" disabled>Add new entry</button>
                </div>

                <div class="mb-3 pt-2" style="border-top: 1px solid gray;">
                    <h5 class="form-label">Statistics:</h5>
                    <p class="mb-0" th:text="${'Total USD Raised: ' + tstats.get('TotalFundraiseUSD')}"></p>
                    <p class="mb-0" th:text="${'Total Donations: ' + tstats.get('TotalDonations')}"></p>
                    <p class="mb-0" th:text="${'Total Items Donated: ' + tstats.get('TotalItemsDonated')}"></p>
                    <p class="mb-0" th:text="${'Total Donation Requests: ' + tstats.get('TotalRequests')}"></p>
                </div>
                <div class="mb-3">
                    <div class="mb-1 d-flex align-items-center">
                        <h5 class="form-label mb-0 me-3 w-50">Monthly statistics:</h5>
                        <select id="monthlySelect" onchange="addStats()" class="form-select w-50"></select>
                    </div>
                    <p class="mb-0" ID="MonthlyDonationReqCount"></p>
                    <p class="mb-0" ID="MonthlyDonationCount"></p>
                    <p class="mb-0" ID="MonthlyFundraiseCount"></p>
                    <p class="mb-0" ID="MonthlyFundraiseUSD"></p>
                </div>

                <div class="mb-3">
                    <button type="button" class="btn btn-success" id="clearcache">Clear all caches</button>
                    <button type="button" class="btn btn-success" id="sendemail" onclick="showSendEmailPopup()">Email</button>
                </div>

                <script>
                    const submitDb = document.getElementById('submitDb');
                    const insertDb = document.getElementById('insertDb');
                    const clearcache = document.getElementById('clearcache');
                    const tableSelect = document.getElementById('tableSelect');

                    const id = document.getElementById('ID');
                    const ids = document.getElementById('IDs');

                    function addSelect(select) {
                        fetch('/admin/list/' + select.value)
                            .then(res => res.json())
                            .then(data => {
                                insertDb.disabled = false;
                                id.disabled = false;
                                ids.disabled = false;
                                document.getElementById('TableDetailsName').innerText = 'Table name: ' + data.tblstats.tableName;
                                document.getElementById('TableDetailsRows').innerText = 'Rows count: ' + data.tblstats.totalRows;
                                document.getElementById('TableDetailsColumns').innerText = 'Columns count: ' + data.tblstats.columnNames.length;
                                document.getElementById('TableDetails').classList.remove('d-none');
                                ids.innerHTML = '<option value="" disabled selected>- Select an item -</option>';
                                data.items.forEach(item => {
                                    if (select.value === 'Donation_Request' || select.value === 'Fundraising' || select.value === 'Campaign' || select.value === 'Notification') {
                                        ids.innerHTML += `<option value="${item.ID}">${item.ID} - ${item.Title}</option>`;
                                    }
                                    else if (select.value === 'Warehouse' || select.value === 'Vehicle' || select.value === 'Association') {
                                        ids.innerHTML += `<option value="${item.ID}">${item.ID} - ${item.Name}</option>`;
                                    }
                                    else if (select.value === 'User' || select.value === 'Staff') {
                                        ids.innerHTML += `<option value="${item.ID}">${item.ID} - ${item.FirstName} - ${item.LastName}</option>`;
                                    }
                                    else if (select.value === 'User' || select.value === 'Staff') {
                                        ids.innerHTML += `<option value="${item.ID}">${item.ID} - ${item.FirstName} - ${item.LastName}</option>`;
                                    }
                                })
                            });
                    }

                    document.getElementById('databaseForm').addEventListener('submit', function (e) {
                        e.preventDefault();
                        window.location.href = '/admin/edit/' + tableSelect.value + '/' + (id.value ? id.value : ids.value);
                    });
                    insertDb.addEventListener("click", (e) => {
                        e.preventDefault();
                        window.location.href = '/admin/edit/' + tableSelect.value;
                    })
                    clearcache.addEventListener("click", (e) => {
                        e.preventDefault();
                        fetch('/api/v1/clearcache')
                            .then(res => res.text())
                            .then(data => {
                                alert(data);
                            });
                    });

                    id.addEventListener("input", () => {
                        ids.disabled = !!id.value;
                        submitDb.disabled = !(id.value || ids.value) || tableSelect.value === '';
                    });
                    ids.addEventListener("change", () => {
                        submitDb.disabled = !(id.value || ids.value) || tableSelect.value === '';
                    });
                </script>
                <script>
                    const select = document.getElementById('monthlySelect');
                    const now = new Date();
                    const currentYear = now.getFullYear();
                    const currentMonth = now.getMonth() + 1; // 1-12

                    for (let year = currentYear; year >= currentYear - 2; year--) {
                        let startMonth = (year === currentYear) ? currentMonth : 12;
                        let endMonth = (year === currentYear - 2) ? 1 : 1;

                        for (let month = startMonth; month >= endMonth; month--) {
                            const monthPadded = String(month).padStart(2, '0');
                            const option = document.createElement('option');
                            option.value = `${year}-${monthPadded}`;
                            option.textContent = `${year}-${monthPadded}`;
                            select.appendChild(option);
                        }
                    }
                    function addStats() {
                        let year = select.value.split('-')[0];
                        let month = select.value.split('-')[1];
                        fetch('/admin/stats/' + year + '/' + month)
                            .then(res => res.json())
                            .then(data => {
                                document.getElementById('MonthlyDonationReqCount').innerText = 'Monthly donation requests: ' + data.MonthlyDonationReqCount;
                                document.getElementById('MonthlyDonationCount').innerText = 'Monthly donations: ' + data.MonthlyDonationCount;
                                document.getElementById('MonthlyFundraiseCount').innerText = 'Monthly fundraises: ' + data.MonthlyFundraiseCount;
                                document.getElementById('MonthlyFundraiseUSD').innerText = 'Monthly fundraises revenue: ' + data.MonthlyFundraiseUSD + ' USD';
                            });
                    }
                    addStats(now.getFullYear(), now.getMonth())
                </script>
                <script>
                </script>
            </form>
        </section>

    </div>

    <form class="modal fade" id="donValidationModal" tabindex="-1" method="post" th:action="${'/admin/donation/validate/id/deny'}">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="donValidationTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-2">
                        <label for="donValidationMessage" class="form-label">Response Message</label>
                        <textarea id="donValidationMessage" name="message" class="form-control"></textarea>
                    </div>
                    <div class="d-flex">
                        <button class="ms-auto btn btn-success" type="submit">Generate Trip Schedule</button>
                    </div>
                </div>
            </div>
        </div>
    </form>
    <form class="modal fade" id="reqValidationModal" tabindex="-1" method="post" th:action="${'/admin/request/validate/id/deny'}">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="reqValidationTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-2">
                        <label for="reqValidationMessage" class="form-label">Response Message</label>
                        <textarea id="reqValidationMessage" name="message" class="form-control"></textarea>
                    </div>
                    <div class="d-flex">
                        <button class="ms-auto btn btn-success" type="submit">Confirm</button>
                    </div>
                </div>
            </div>
        </div>
    </form>
    <form class="modal fade" id="emailValidationModal" tabindex="-1" method="post" th:action="${'/admin/email/send'}">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="emailValidationTitle">Send email to User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-2">
                        <label for="emailAddress" class="form-label">Email Address</label>
                        <input type="email" id="emailAddress" name="email" placeholder="customer@gmail.com" class="form-control">
                    </div>
                    <div class="mb-2">
                        <label for="emailSubject" class="form-label">Subject</label>
                        <input type="text" id="emailSubject" name="subject" placeholder="Details Clarification" class="form-control">
                    </div>
                    <div class="mb-2">
                        <label for="emailMessage" class="form-label">Message</label>
                        <textarea id="emailMessage" name="message" rows="12" placeholder="Hello dear {name}, please update your account details. Yours sincerely." class="form-control"></textarea>
                    </div>
                    <div class="d-flex">
                        <button class="ms-auto btn btn-success" type="submit">Confirm</button>
                    </div>
                </div>
            </div>
        </div>
    </form>

    <script>
        const donTitle = document.getElementById("donValidationTitle")
        function showDonationValidationPopup(button, accept) {
            const modal = new bootstrap.Modal(document.getElementById("donValidationModal"));
            if (accept) {
                donTitle.innerText = "Accept donation";
                document.getElementById("donValidationModal").action = "/admin/donation/validate/" + button.getAttribute("don-id") + "/accept";
            } else {
                donTitle.innerText = "Deny donation";
                document.getElementById("donValidationModal").action = "/admin/donation/validate/" + button.getAttribute("don-id") + "/deny";
            }
            modal.show();
        }
    </script>
    <script>
        const reqTitle = document.getElementById("reqValidationTitle")
        function showRequestValidationPopup(button, accept) {
            const modal = new bootstrap.Modal(document.getElementById("reqValidationModal"));
            if (accept) {
                reqTitle.innerText = "Accept donation request";
                document.getElementById("reqValidationModal").action = "/admin/request/validate/" + button.getAttribute("req-id") + "/accept";
            } else {
                reqTitle.innerText = "Deny donation request";
                document.getElementById("reqValidationModal").action = "/admin/request/validate/" + button.getAttribute("req-id") + "/deny";
            }
            modal.show();
        }
    </script>
    <script>
        function showSendEmailPopup() {
            const modal = new bootstrap.Modal(document.getElementById("emailValidationModal"));
            modal.show();
        }
    </script>
</main>

<div th:replace="/fragments/bottom-nav-admin :: adminBottomNav" id="bottomNav"></div>

<!-- Scripts -->
<script src="/js/app.js"></script>
<script src="/js/pagecarousel.js"></script>

</body>
</html>
