<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Account Verification</title>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#822BD9">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/img/icons/icon-512.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="container text-center">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow p-4">
        <h3 class="mb-3" th:text="${success} ? 'Success!' : 'Oops!'"></h3>

        <p th:if="${error}" th:text="${error}" class="alert alert-danger"></p>
        <p th:if="${success}" th:text="${success}" class="alert alert-success"></p>

        <a th:if="${success}" th:href="'/accounts/login?' + ${loginparam}" class="btn btn-danger mt-3">Go to log in</a>
        <a th:if="${error}" href="/accounts/signup" class="btn btn-secondary mt-3">Try Again</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
