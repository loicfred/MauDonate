<!DOCTYPE html>
<html lang="en">
<head id="master-head">
    <title>Home | MauDonate</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#822BD9">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon"  href="/img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/main.css">

    <style>
        .request-card, .modal-content {
            margin: 8px;
            border-radius: 10px;
            background-color: var(--primary-color-lighter);
        }
    </style>
</head>

<body>

<!-- Main Header -->
<header th:replace="/fragments/header :: mainHeader" id="master-header"></header>

<main class="page-wrap" id="pageWrap">
    <div class="page-carousel" id="pageCarousel">

        <!-- PAGE 1 -->
        <section class="page">
            <div class="container h-100 align-items-center">
                <div class="row justify-content-center">
                    <div class="col-md-8 col-lg-6 text-center text-white">

                        <img src="/img/logo_transparent.png" height="250" class="mb-4" draggable="false" alt="BeatCam Logo">

                        <p class="lead mb-4">
                            Your kindness. In any way.
                        </p>

                        <button class="btn btn-lg btn-success px-5 mb-3" onclick="goToPage(1)" id="donateNow">
                            Donate Now
                        </button>

                    </div>
                </div>
            </div>
        </section>

        <!-- PAGE 2 -->
        <section class="page">
            <p style="justify-content: center; align-items: center; text-align: center; padding: 30px;" th:if="${requests.isEmpty()}">No one has reached out yet.</p>
            <div th:each="req : ${requests}" class="request-card card mb-3">
                <div class="card-body">
                    <div class="text-muted d-flex align-items-center">
                        <h5 th:text="${req.getUser().getFirstName() + ' ' + req.getUser().getLastName()}"></h5>
                        <h5 class="ms-auto" th:text="${'Goal: Rs ' + req.GoalAmount}"></h5>
                    </div>
                    <h6 class="mb-0 fw-bold" th:text="${req.Title}"></h6>
                    <p th:text="${req.Message}"></p>
                    <div class="text-muted d-flex align-items-center">
                        <small th:text="${'Created at ' + req.CreatedAt}"></small>
                        <button class="ms-auto btn btn-primary" onclick="showDonatePopup(this)"
                                th:data-banks="${req.BankName}"
                                th:data-account="${req.AccountNumber}">Donate
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- PAGE 3 -->
        <section class="page">
            <p style="justify-content: center; align-items: center; text-align: center; padding: 30px;">Coming soon.</p>
        </section>

        <!-- PAGE 4 -->
        <section class="page">
            <p style="justify-content: center; align-items: center; text-align: center; padding: 30px;">Coming soon.</p>
        </section>

    </div>




    <div class="modal fade" id="donateModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Donate via Bank Transfer</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p><strong>Bank:</strong> <span id="bankName"></span></p>
                    <p><strong>Account ID:</strong></p>
                    <div class="input-group">
                        <input type="text" id="accountNumber" class="form-control" readonly>
                        <button class="btn btn-secondary" onclick="copyAccountNumber()">
                            Copy
                        </button>
                    </div>
                    <p class="text-success mt-2 mb-0 d-none" style="text-align: center;" id="copySuccess">
                        Account ID copied ✔
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showDonatePopup(button) {
            const bank = button.getAttribute("data-banks");
            const account = button.getAttribute("data-account");
            document.getElementById("bankName").innerText = bank;
            document.getElementById("accountNumber").value = account;
            document.getElementById("copySuccess").classList.add("d-none");
            const modal = new bootstrap.Modal(document.getElementById("donateModal"));
            modal.show();
        }
        function copyAccountNumber() {
            const input = document.getElementById("accountNumber");
            input.select();
            input.setSelectionRange(0, 99999); // mobile support
            navigator.clipboard.writeText(input.value);
            document.getElementById("copySuccess").classList.remove("d-none");
        }
    </script>
</main>

<!-- Scripts -->
<script src="/js/app.js"></script>
<script src="/js/pagecarousel.js"></script>


<script src="/pwa-init.js"></script>



<div th:replace="/fragments/bottom-nav :: mainBottomNav" id="bottomNav"></div>

</body>
</html>
